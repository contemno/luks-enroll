# Dracut configuration for LUKS unlock support in the initramfs.
# This file is a shell script sourced by dracut. Each block adds dracut
# modules and the matching libcryptsetup token plugin only when the
# relevant userspace libraries are installed, so it is safe to ship
# unconditionally.

# FIDO2 token support (requires libfido2)
if dpkg -s libfido2-1 >/dev/null 2>&1; then
    add_dracutmodules+=" fido2 "
    for _f in /usr/lib/*/cryptsetup/libcryptsetup-token-systemd-fido2.so; do
        [ -e "$_f" ] && install_items+=" $_f "
    done
    unset _f
fi

# TPM2 support (requires libtss2)
if dpkg -s libtss2-esys-3.0.2-0 >/dev/null 2>&1 \
   || dpkg -s libtss2-esys0 >/dev/null 2>&1; then
    add_dracutmodules+=" tpm2-tss "
    for _f in /usr/lib/*/cryptsetup/libcryptsetup-token-systemd-tpm2.so; do
        [ -e "$_f" ] && install_items+=" $_f "
    done
    unset _f
fi
