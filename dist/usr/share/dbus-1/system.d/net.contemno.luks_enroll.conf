<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the bus name -->
  <policy user="root">
    <allow own="net.contemno.LuksEnroll"/>
  </policy>

  <!-- Allow any user to send messages to the service;
       polkit handles actual authorization inside the service -->
  <policy context="default">
    <allow send_destination="net.contemno.LuksEnroll"/>
  </policy>
</busconfig>
