name: CI

on:
  # PR-only: pushes to main are validated by the release pipeline
  # (autotag.yml -> build-release.yml, which runs the same lint/test), so
  # gating here too would just duplicate that work on every merge.
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs for the same PR when new commits are pushed.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether this PR is docs-only. The lint/test/rust jobs below are
  # required status checks, so we can't drop them with `paths-ignore` (a check
  # that never reports leaves the PR stuck "waiting"). Instead they stay
  # reachable but skip when only docs changed — a *skipped* required job still
  # satisfies branch protection, so docs-only PRs merge without burning CI on a
  # full Rust build + TPM roundtrips.
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # need the base commit to diff against

      - name: Detect docs-only change
        id: filter
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          files="$(git diff --name-only "${BASE}"...HEAD)"
          echo "Changed files:"
          echo "${files:-<none>}"
          docs_only=true
          [ -z "$files" ] && docs_only=false  # empty diff -> run everything
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.md|LICENSE) ;;            # documentation, ignore
              *) docs_only=false ;;       # anything else -> real CI
            esac
          done <<< "$files"
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
          echo "docs_only=$docs_only"

  lint:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"

      - name: Install dev tooling (hash-pinned)
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"

      - name: Install dev tooling (hash-pinned)
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Run tests
        run: python3 -m pytest tests/ -v

  rust:
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install C build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcryptsetup-dev libfido2-dev libtss2-dev libblkid-dev

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Tests (includes LUKS2 image-file integration tests)
        run: cargo test --workspace

      - name: TPM2 seal/unseal roundtrips against swtpm
        run: |
          sudo apt-get install -y --no-install-recommends swtpm
          mkdir -p /tmp/swtpm-state
          swtpm socket --tpm2 --server port=2321 --ctrl type=tcp,port=2322 \
            --flags not-need-init,startup-clear --tpmstate dir=/tmp/swtpm-state --daemon
          TCTI="swtpm:host=127.0.0.1,port=2321" \
            cargo test -p luks-enroll-service tpm2 -- --ignored
