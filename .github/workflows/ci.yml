name: CI

on:
  # Promotion flow: feature branch -> dev -> main. Gate PRs into BOTH:
  # feature->dev PRs (keep dev green) and the dev->main release PR (validate
  # the release candidate before it merges). This stays PR-only -- pushes to
  # dev/main are validated post-merge by the release pipeline (autotag.yml ->
  # build-release.yml, same lint/test), so a push trigger here would duplicate it.
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

# Cancel superseded runs for the same PR when new commits are pushed.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Classify the diff so each job runs only when its area changed. The
  # lint/test/rust jobs are required status checks, so we can't drop them with
  # `paths-ignore` (a check that never reports leaves the PR stuck "waiting").
  # Instead they stay reachable but skip when their area is untouched — a
  # *skipped* required job still satisfies branch protection.
  #
  # Mapping:
  #   *.md / LICENSE        -> docs, ignored
  #   rust/**               -> Rust: rust-build (fmt/clippy/build/test) and the
  #                            swtpm job (TPM2 roundtrips), gated by the `rust` check
  #   *.py / pyproject.toml / requirements-dev.txt / tests/**
  #                         -> Python (ruff lint + pytest)
  #   anything else         -> shared/build infra (debian/, scripts/, Makefile,
  #                            CI itself, …): conservatively run BOTH so a build
  #                            change can't slip through misclassified.
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # need the base commit to diff against

      - name: Classify changed paths
        id: filter
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          files="$(git diff --name-only "${BASE}"...HEAD)"
          echo "Changed files:"
          echo "${files:-<none>}"
          python=false rust=false other=false
          # Empty diff -> treat as infra change and run everything.
          [ -z "$files" ] && other=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.md|LICENSE) ;;                                   # docs, ignore
              rust/*) rust=true ;;                               # Rust workspace
              *.py|pyproject.toml|requirements-dev.txt|tests/*)  # Python
                python=true ;;
              *) other=true ;;                                   # infra -> run both
            esac
          done <<< "$files"
          $other && { python=true; rust=true; }
          echo "python=$python" >> "$GITHUB_OUTPUT"
          echo "rust=$rust" >> "$GITHUB_OUTPUT"
          echo "python=$python rust=$rust (other=$other)"

  lint:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: ./.github/actions/python-setup

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: ./.github/actions/python-setup

      - name: Run tests
        run: python3 -m pytest tests/ -v

  # The Rust checks fan out into two parallel jobs that share a build cache:
  #   rust-build — fmt + clippy + build + `cargo test --workspace`
  #   swtpm      — the #[ignore]d TPM2 seal/unseal roundtrips against swtpm
  # The required status check stays named `rust`: it's a tiny aggregator (below)
  # that passes only if BOTH finish green, so TPM failures keep gating merges
  # with no branch-protection change. Splitting swtpm off moves its install +
  # startup and the TPM compile-and-run off the build critical path (no coverage
  # loss — the same two roundtrips still run). swtpm is intentionally NOT
  # path-gated to tpm2.rs: it's the only real-TPM coverage and guards the
  # parity-critical systemd token format, which shared code can break without
  # touching tpm2.rs; running in parallel makes the extra coverage ~free.
  rust-build:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: ./.github/actions/install-c-deps

      # Cache the cargo registry/git and rust/target, keyed on rust/Cargo.lock +
      # rustc. `shared-key` (instead of the default per-job key) lets the swtpm
      # job restore the same warm cache; the manifest lives under rust/.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: rust
          shared-key: rust-ci

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Tests (includes LUKS2 image-file integration tests)
        run: cargo test --workspace

  swtpm:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: ./.github/actions/install-c-deps

      # Same shared-key as rust-build: both restore one warm cache (rust-cache
      # caches dependencies, which are identical across the two jobs).
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: rust
          shared-key: rust-ci

      - name: TPM2 seal/unseal roundtrips against swtpm
        run: |
          sudo apt-get install -y --no-install-recommends swtpm
          mkdir -p /tmp/swtpm-state
          swtpm socket --tpm2 --server port=2321 --ctrl type=tcp,port=2322 \
            --flags not-need-init,startup-clear --tpmstate dir=/tmp/swtpm-state --daemon
          TCTI="swtpm:host=127.0.0.1,port=2321" \
            cargo test -p luks-enroll-service tpm2 -- --ignored

  # Aggregator: the single required `rust` status check. `if: always()` makes it
  # run even when an upstream job fails, so it FAILS the check (a plain `needs`
  # job would instead be reported "skipped", which branch protection treats as
  # passing). On docs-only PRs (rust == false) it's skipped, which still
  # satisfies branch protection — same as the lint/test/area jobs.
  rust:
    needs: [changes, rust-build, swtpm]
    if: always() && needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Require rust-build and swtpm to pass
        run: |
          echo "rust-build=${{ needs.rust-build.result }} swtpm=${{ needs.swtpm.result }}"
          [ "${{ needs.rust-build.result }}" = "success" ] || exit 1
          [ "${{ needs.swtpm.result }}" = "success" ] || exit 1
