name: CI

on:
  # PR-only: pushes to main are validated by the release pipeline
  # (autotag.yml -> build-release.yml, which runs the same lint/test), so
  # gating here too would just duplicate that work on every merge.
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs for the same PR when new commits are pushed.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Classify the diff so each job runs only when its area changed. The
  # lint/test/rust jobs are required status checks, so we can't drop them with
  # `paths-ignore` (a check that never reports leaves the PR stuck "waiting").
  # Instead they stay reachable but skip when their area is untouched — a
  # *skipped* required job still satisfies branch protection.
  #
  # Mapping:
  #   *.md / LICENSE        -> docs, ignored
  #   rust/**               -> Rust (build/clippy/test + TPM roundtrips)
  #   *.py / pyproject.toml / requirements-dev.txt / tests/**
  #                         -> Python (ruff lint + pytest)
  #   anything else         -> shared/build infra (debian/, scripts/, Makefile,
  #                            CI itself, …): conservatively run BOTH so a build
  #                            change can't slip through misclassified.
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # need the base commit to diff against

      - name: Classify changed paths
        id: filter
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          files="$(git diff --name-only "${BASE}"...HEAD)"
          echo "Changed files:"
          echo "${files:-<none>}"
          python=false rust=false other=false
          # Empty diff -> treat as infra change and run everything.
          [ -z "$files" ] && other=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.md|LICENSE) ;;                                   # docs, ignore
              rust/*) rust=true ;;                               # Rust workspace
              *.py|pyproject.toml|requirements-dev.txt|tests/*)  # Python
                python=true ;;
              *) other=true ;;                                   # infra -> run both
            esac
          done <<< "$files"
          $other && { python=true; rust=true; }
          echo "python=$python" >> "$GITHUB_OUTPUT"
          echo "rust=$rust" >> "$GITHUB_OUTPUT"
          echo "python=$python rust=$rust (other=$other)"

  lint:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"

      - name: Install dev tooling (hash-pinned)
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"

      - name: Install dev tooling (hash-pinned)
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Run tests
        run: python3 -m pytest tests/ -v

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install C build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcryptsetup-dev libfido2-dev libtss2-dev libblkid-dev

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Tests (includes LUKS2 image-file integration tests)
        run: cargo test --workspace

      - name: TPM2 seal/unseal roundtrips against swtpm
        run: |
          sudo apt-get install -y --no-install-recommends swtpm
          mkdir -p /tmp/swtpm-state
          swtpm socket --tpm2 --server port=2321 --ctrl type=tcp,port=2322 \
            --flags not-need-init,startup-clear --tpmstate dir=/tmp/swtpm-state --daemon
          TCTI="swtpm:host=127.0.0.1,port=2321" \
            cargo test -p luks-enroll-service tpm2 -- --ignored
