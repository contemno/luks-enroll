name: CI

# ── Repo-standard CI ─────────────────────────────────────────────────────────
# Classify the diff ONCE, then gate each area's jobs with `if:` so unrelated
# jobs SKIP. Required checks must stay reachable: a check that never reports
# wedges the PR ("waiting for status"); a SKIPPED required job satisfies branch
# protection. So we never use `paths-ignore` on required jobs — we skip via `if:`.
# See STANDARD.md → "Skip, don't ignore" and "The aggregator gate".
#
# Promotion flow: feature -> dev -> main. Gate PRs into BOTH dev and main.
on:
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

# Cancel superseded runs for the same PR when new commits are pushed.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Classify changed paths -> one boolean output per area. Anything unrecognized
  # (build infra, CI itself) flips every area on, so a misclassified change fails
  # safe toward running MORE, not less.
  changes:
    runs-on: ubuntu-latest
    outputs:
      # TODO: one output per area you classify below.
      app: ${{ steps.filter.outputs.app }}
      service: ${{ steps.filter.outputs.service }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # need the base commit to diff against

      - name: Classify changed paths
        id: filter
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          files="$(git diff --name-only "${BASE}"...HEAD)"
          echo "Changed files:"; echo "${files:-<none>}"
          app=false service=false other=false
          # Empty diff -> treat as infra change and run everything.
          [ -z "$files" ] && other=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              *.md|LICENSE) ;;                 # docs -> ignore
              # TODO: map YOUR directories/extensions to areas.
              service/*) service=true ;;
              app/*|*.py|tests/*) app=true ;;
              *) other=true ;;                 # infra -> run everything
            esac
          done <<< "$files"
          $other && { app=true; service=true; }
          echo "app=$app" >> "$GITHUB_OUTPUT"
          echo "service=$service" >> "$GITHUB_OUTPUT"
          echo "app=$app service=$service (other=$other)"

  # ── A simple, single required check per area ────────────────────────────────
  # Set `app` as a required status check in branch protection. It skips (and so
  # passes) on PRs that don't touch the app.
  app:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      # TODO: set up your toolchain, then lint + test.
      #   - uses: actions/setup-python@<SHA>  # vX.Y.Z
      #   - run: pip install --require-hashes -r requirements-dev.txt
      #   - run: ruff check . && ruff format --check .
      #   - run: python3 -m pytest tests/ -v
      - run: echo "TODO - app lint + test"

  # ── A required check that FANS OUT into parallel jobs + an aggregator ────────
  # Protect the `service` aggregator name (below), NOT service-build/service-it.
  # This lets you reshape the fan-out without touching branch-protection.
  service-build:
    needs: changes
    if: needs.changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      # Share ONE warm cache across the fan-out via a shared key (deps are
      # identical across jobs on the same lockfile). TODO: add your cache step.
      - run: echo "TODO - build + unit tests"

  service-integration:
    needs: changes
    if: needs.changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - run: echo "TODO - slower integration / hardware-emulator tests"

  # Aggregator: the single required `service` check. `if: always()` makes it run
  # even when an upstream job fails, so it FAILS the check — a plain `needs` job
  # would be reported "skipped", which branch protection treats as PASSING.
  service:
    needs: [changes, service-build, service-integration]
    if: always() && needs.changes.outputs.service == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Require service-build and service-integration to pass
        run: |
          echo "build=${{ needs.service-build.result }} it=${{ needs.service-integration.result }}"
          [ "${{ needs.service-build.result }}" = "success" ] || exit 1
          [ "${{ needs.service-integration.result }}" = "success" ] || exit 1
