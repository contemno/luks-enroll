name: Build & Release

# Reusable workflow: lint, test, build the .deb for a given tag, then publish a
# GitHub release with the package attached. Called by:
#   * release.yml  — when a v* tag is pushed by a human (manual path)
#   * autotag.yml  — after it auto-creates a tag on push to dev/main
#
# It is factored out so both paths build and release identically. The release
# is created as a draft *with* the .deb attached and then flipped to published,
# which is required because this repo uses immutable releases (assets can only
# be attached while the release is still a draft).

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (tag) to build and release.
        required: true
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease.
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"

      - name: Install dev tooling (hash-pinned)
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"

      - name: Install dev tooling (hash-pinned)
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Run tests
        run: python3 -m pytest tests/ -v

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    container:
      image: ubuntu:noble

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential git curl ca-certificates dpkg-dev debhelper devscripts \
            pkg-config clang libclang-dev \
            libcryptsetup-dev libblkid-dev libfido2-dev libtss2-dev \
            python3 python3-gi gir1.2-gtk-4.0 gir1.2-adw-1 \
            libcryptsetup12 systemd

      # The distro rustc is too old for the workspace (Cargo.lock v4 / crate
      # MSRVs), so install a current stable toolchain via rustup.
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0  # need full history + tags for changelog generation

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Generate debian/changelog from git history
        run: |
          DEBFULLNAME="GitHub Actions" \
          DEBEMAIL="actions@github.com" \
          ./scripts/gen-changelog.sh
          head -20 debian/changelog

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp ../*.deb ../*.buildinfo ../*.changes artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: luks-enroll-noble
          path: artifacts/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      # This repository uses immutable releases: assets can only be attached
      # while the release is a draft, so create the draft with the assets first
      # and flip it to published as a separate step.
      - name: Create draft release with assets
        id: draft_release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          tag_name: ${{ inputs.ref }}
          files: artifacts/*.deb
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          draft: true

      - name: Publish the draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${{ steps.draft_release.outputs.id }}" \
            -F draft=false --jq .html_url
