name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"

      - name: Install dev tooling (hash-pinned)
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.x"

      - name: Install dev tooling (hash-pinned)
        run: pip install --require-hashes -r requirements-dev.txt

      - name: Run tests
        run: python3 -m pytest tests/ -v

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.version.outputs.prerelease }}
    container:
      image: ubuntu:noble

    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential git dpkg-dev debhelper devscripts \
            python3 python3-gi gir1.2-gtk-4.0 gir1.2-adw-1 \
            libcryptsetup12 systemd

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # need full history + tags for changelog generation

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Detect prerelease from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            PRERELEASE="false"
          else
            PRERELEASE="true"
          fi
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${TAG} (prerelease=${PRERELEASE})"

      - name: Generate debian/changelog from git history
        run: |
          DEBFULLNAME="GitHub Actions" \
          DEBEMAIL="actions@github.com" \
          ./scripts/gen-changelog.sh
          head -20 debian/changelog

      - name: Build package
        run: dpkg-buildpackage -us -uc -b

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp ../*.deb ../*.buildinfo ../*.changes artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: luks-enroll-noble
          path: artifacts/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: artifacts/*.deb
          generate_release_notes: true
          prerelease: ${{ needs.build.outputs.prerelease == 'true' }}
