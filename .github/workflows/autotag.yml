name: Auto-tag

# Automatically tag (and release) on every push/merge to a tracked branch:
#   * dev  -> prerelease tag  vX.Y.Z-dev.<UTC-date>.<short-sha>, published as a
#             GitHub *prerelease*.
#   * main -> release tag     vX.Y.Z (patch auto-bumped from the latest release),
#             published as a full release.
#
# The version base is the latest plain vX.Y.Z release tag (prerelease tags are
# ignored); if none exists yet it is seeded from rust/service/Cargo.toml. The
# tag is created with the default GITHUB_TOKEN — which intentionally does NOT
# trigger release.yml's `on: push: tags` — so this workflow drives the build
# itself by calling the build-release.yml reusable workflow. That also keeps the
# whole flow within one run (no PAT/App token needed) and avoids double builds.
on:
  push:
    branches: [dev, main]
    # Don't cut a tag/release for pushes that can't change the shipped .deb or
    # its runtime behavior (a full container build + publish is wasteful, and it
    # inflates the patch version for nothing). paths-ignore is all-or-nothing:
    # any of these bundled with real code still releases normally.
    #   docs            — **.md, LICENSE
    #   CI/automation   — .github/**
    #   Python tests    — tests/** (Rust tests live in rust/** and can't be split)
    #   dev tooling     — requirements-dev.txt
    # NOTE: pyproject.toml is the Python package metadata, not just lint config,
    # so it is intentionally NOT ignored.
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/**'
      - 'tests/**'
      - 'requirements-dev.txt'

permissions:
  contents: write

# Serialize releases per branch so two quick pushes don't race to tag/build.
# Never cancel in-progress: aborting a half-done tag/release is worse than
# letting it finish.
concurrency:
  group: autotag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      prerelease: ${{ steps.compute.outputs.prerelease }}
      created: ${{ steps.create.outputs.created }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # need all tags to find the latest release

      - name: Compute next version and tag
        id: compute
        run: |
          set -euo pipefail
          # Base = latest plain vX.Y.Z release tag (ignore prereleases like -dev),
          # else seed from the workspace crate version.
          latest="$(git tag -l 'v*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
          if [ -n "$latest" ]; then
            base="${latest#v}"
          else
            base="$(grep -m1 -E '^version[[:space:]]*=' rust/service/Cargo.toml \
              | sed -E 's/.*"([0-9]+\.[0-9]+\.[0-9]+)".*/\1/')"
          fi
          IFS=. read -r major minor patch <<<"$base"
          next="${major}.${minor}.$((patch + 1))"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            tag="v${next}"
            prerelease=false
          else
            tag="v${next}-dev.$(date -u +%Y%m%d).$(git rev-parse --short HEAD)"
            prerelease=true
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "Branch ${GITHUB_REF_NAME}: base=${base} -> tag=${tag} (prerelease=${prerelease})"

      - name: Create and push tag
        id: create
        env:
          TAG: ${{ steps.compute.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin; skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"
          echo "created=true" >> "$GITHUB_OUTPUT"

  release:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build-release.yml
    with:
      ref: ${{ needs.tag.outputs.tag }}
      prerelease: ${{ needs.tag.outputs.prerelease == 'true' }}
