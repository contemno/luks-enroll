name: Auto-tag

# Automatically tag (and release) on every push/merge to a tracked branch:
#   * dev  -> prerelease tag  vX.Y.Z-dev.<UTC-date>.<short-sha>, published as a
#             GitHub *prerelease*.
#   * main -> release tag     vX.Y.Z (next version per scripts/next-version.sh),
#             published as a full release.
#
# The next version is computed by scripts/next-version.sh as max(patch-bump of
# the latest plain vX.Y.Z release tag, the hand-maintained ./VERSION floor), so
# bumping ./VERSION's minor/major cuts exactly one such release and patch
# releases resume afterward (prerelease -dev.* tags are ignored; ./VERSION falls
# back to rust/service/Cargo.toml). The
# tag is created with the default GITHUB_TOKEN — which intentionally does NOT
# trigger release.yml's `on: push: tags` — so this workflow drives the build
# itself by calling the build-release.yml reusable workflow. That also keeps the
# whole flow within one run (no PAT/App token needed) and avoids double builds.
on:
  push:
    branches: [dev, main]
    # Don't cut a tag/release for pushes that can't change the shipped .deb or
    # its runtime behavior (a full container build + publish is wasteful, and it
    # inflates the patch version for nothing). paths-ignore is all-or-nothing:
    # any of these bundled with real code still releases normally.
    #   docs            — **.md, LICENSE
    #   CI/automation   — .github/**
    #   Python tests    — tests/** (Rust tests live in rust/** and can't be split)
    #   dev tooling     — requirements-dev.txt
    # NOTE: pyproject.toml is the Python package metadata, not just lint config,
    # so it is intentionally NOT ignored; nor is ./VERSION (the release floor),
    # so a lone version bump still cuts the release.
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.github/**'
      - 'tests/**'
      - 'requirements-dev.txt'

permissions:
  contents: write

# Serialize releases per branch so two quick pushes don't race to tag/build.
# Never cancel in-progress: aborting a half-done tag/release is worse than
# letting it finish.
concurrency:
  group: autotag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      prerelease: ${{ steps.compute.outputs.prerelease }}
      created: ${{ steps.create.outputs.created }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # need all tags to find the latest release

      - name: Compute next version and tag
        id: compute
        run: |
          set -euo pipefail
          # next = max(patch-bump of the latest release, ./VERSION floor);
          # see scripts/next-version.sh.
          next="$(./scripts/next-version.sh)"

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            tag="v${next}"
            prerelease=false
          else
            tag="v${next}-dev.$(date -u +%Y%m%d).$(git rev-parse --short HEAD)"
            prerelease=true
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "Branch ${GITHUB_REF_NAME}: next=${next} -> tag=${tag} (prerelease=${prerelease})"

      - name: Create and push tag
        id: create
        env:
          TAG: ${{ steps.compute.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin; skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"
          echo "created=true" >> "$GITHUB_OUTPUT"

  release:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/build-release.yml
    with:
      ref: ${{ needs.tag.outputs.tag }}
      prerelease: ${{ needs.tag.outputs.prerelease == 'true' }}
