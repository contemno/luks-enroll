name: Install C build dependencies
description: >-
  Install the C libraries the Rust service links against
  (cryptsetup, fido2, tss2, blkid).
runs:
  using: composite
  steps:
    - name: Install C build dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libcryptsetup-dev libfido2-dev libtss2-dev libblkid-dev
