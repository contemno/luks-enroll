name: 📖 Documentation
description: Something in the README, the wiki, or man/help text is wrong or missing
labels: ["documentation", "triage"]
body:
  - type: input
    id: location
    attributes:
      label: Where?
      description: File and section, or a URL.
      placeholder: "e.g. README.md → Initramfs unlock, or the Rust-Migration wiki page"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What's wrong or missing?
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      description: Optional — a proposed wording or the correct command/steps.
