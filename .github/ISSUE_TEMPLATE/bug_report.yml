name: 🐞 Bug report
description: Something is broken or behaves unexpectedly
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in as much as you can — logs and
        environment details are the most useful parts for diagnosing problems.

        <!-- TODO: if issues carry logs, warn here never to paste secrets
             (tokens, passwords, keys). Make the safe path the easy path. -->

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
        - label: This is a bug, not a usage question (those go to Discussions)
          required: true
        - label: This is not a security vulnerability (those go to a private advisory)
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected component
      description: Where does the problem appear? Pick the closest match.
      multiple: true
      options:
        # TODO: replace with your subsystems.
        - Component A
        - Component B
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the actual behavior, including any error text.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste the relevant log output. Scrub anything secret.
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: Release, tag, or git commit.
      placeholder: "e.g. 1.0.0, or commit af37d21"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS / distro / runtime versions relevant to the bug"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, config snippets, related issues.
