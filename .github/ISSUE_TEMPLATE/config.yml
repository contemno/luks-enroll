# Force users through the structured forms below.
blank_issues_enabled: false
contact_links:
  - name: 🔒 Security vulnerability (do NOT open a public issue)
    url: https://github.com/contemno/luks-enroll/security/advisories/new
    about: >-
      luks-enroll handles disk-encryption keys. Report anything that could
      weaken a keyslot, leak key material, or bypass polkit/authorization
      privately via a GitHub security advisory — or email josh@contemno.net.
  - name: 💬 Question / usage help
    url: https://github.com/contemno/luks-enroll/discussions
    about: >-
      Not sure if it's a bug? Ask in Discussions. Setup, crypttab, and
      initramfs questions are a better fit there than the issue tracker.
