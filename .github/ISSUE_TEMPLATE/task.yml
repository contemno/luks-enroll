name: 📋 Task / roadmap item
description: An engineering task, refactor, spike, or roadmap item (usually maintainer-filed)
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        For planned work — a refactor, infrastructure, a research spike, or a roadmap
        item. Link it to a milestone and add it to the
        [Roadmap (#28)](https://github.com/contemno/luks-enroll/issues/28) so the plan
        stays in sync. (User-facing bugs or feature ideas → the Bug or Feature forms.)

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What needs doing, and why now?
    validations:
      required: true

  - type: input
    id: roadmap
    attributes:
      label: Milestone / roadmap link
      description: The milestone this belongs to, and/or the Roadmap (#28) line it advances.
      placeholder: "e.g. Migrate the GTK client to Rust (#1); part of #28"

  - type: textarea
    id: scope
    attributes:
      label: Scope / approach
      description: Sketch the steps or the shape of the change. Note anything out of scope.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it's done? Include the docs/tests that must move (see CLAUDE.md).
      placeholder: |
        - [ ] ...
        - [ ] Docs updated (README / parity & design wiki page / #28) or N/A
        - [ ] Tests added or updated

  - type: checkboxes
    id: contract
    attributes:
      label: Interface impact
      options:
        - label: This may change the frozen D-Bus contract (dbus/net.contemno.LuksEnroll1.xml) — client + service + a test must move together
