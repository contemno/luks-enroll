name: 📋 Task / roadmap item
description: An engineering task, refactor, spike, or roadmap item (usually maintainer-filed)
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        For planned work — a refactor, infrastructure, a research spike, or a
        roadmap item. Link it to a milestone so the plan stays in sync.
        (User-facing bugs or feature ideas → the Bug or Feature forms.)

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What needs doing, and why now?
    validations:
      required: true

  - type: input
    id: roadmap
    attributes:
      label: Milestone / roadmap link
      description: The milestone this belongs to.

  - type: textarea
    id: scope
    attributes:
      label: Scope / approach
      description: Sketch the steps or the shape of the change. Note anything out of scope.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it's done? Include the docs/tests that must move.
      placeholder: |
        - [ ] ...
        - [ ] Docs updated or N/A
        - [ ] Tests added or updated

  # TODO: replace with your real interface/contract invariant, or remove.
  - type: checkboxes
    id: contract
    attributes:
      label: Interface impact
      options:
        - label: This may change a frozen interface contract — both sides + a test must move together
